services:
  postgres:
    image: postgres:16-alpine
    container_name: manage-house-money-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: manage_house_money
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d manage_house_money"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - manage-house-money-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: manage-house-money-backend
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DATABASE_URL=jdbc:postgresql://postgres:5432/manage_house_money
      - DATABASE_USERNAME=postgres
      - DATABASE_PASSWORD=postgres
      - DDL_AUTO=update
      - SHOW_SQL=false
      - PORT=8080
      - OPENAI_API_KEY=
      - JAVA_OPTS=-Xmx512m -Xms256m
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s
    networks:
      - manage-house-money-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: manage-house-money-frontend
    # Porta 80 do host está ocupada pelo Nextcloud; frontend exposto na 8081.
    ports:
      - "8081:80"
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - manage-house-money-network

volumes:
  postgres_data:

networks:
  manage-house-money-network:
    driver: bridge
